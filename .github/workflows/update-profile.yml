name: Update profile timestamp

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Touch README for freshness signal
        run: |
          # Mantém o badge de last-commit e o perfil "vivos" sem alterar conteúdo.
          DATE=$(date -u +"%Y-%m-%d")
          if ! grep -q "<!-- auto:$DATE -->" README.md; then
            sed -i '/<!-- auto:.* -->/d' README.md || true
            printf '\n<!-- auto:%s -->\n' "$DATE" >> README.md
          fi

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: refresh profile timestamp"
          git push
