name: Refresh profile

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump profile views counter
        run: |
          python3 - <<'PY'
          import json, pathlib
          p = pathlib.Path(".github/profile-views.json")
          data = json.loads(p.read_text()) if p.exists() else {"count": 0}
          data["count"] = int(data.get("count", 0)) + 1
          p.parent.mkdir(parents=True, exist_ok=True)
          p.write_text(json.dumps(data) + "\n")
          print("views=", data["count"])
          PY

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/profile-views.json
          git diff --staged --quiet || git commit -m "chore: refresh profile views counter"
          git push
